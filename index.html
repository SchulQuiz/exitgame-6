<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exitspiel</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.09);
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #38bdf8;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.28), transparent 34%),
        linear-gradient(135deg, #020617, var(--bg));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(100%, 520px);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 32px;
    }

    .lead {
      color: var(--muted);
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      line-height: 1.55;
      margin-bottom: 24px;
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    .button {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 750;
      transition: transform 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    .button.primary {
      background: var(--accent);
      color: #082f49;
    }

    .button.primary:hover {
      background: #7dd3fc;
    }

    .button.secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
        align-items: start;
        padding-top: 18vh;
      }

      .card {
        border-radius: 20px;
        padding: 22px;
      }

      .lead {
        font-size: 1.08rem;
        margin-bottom: 20px;
      }

      .button {
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p class="lead">Lade die Anleitung für das nächste Rätsel herunter.</p>

      <div class="actions">
        <a class="button primary" href="anweisung.pdf" target="_blank" rel="noopener">PDF öffnen</a>
        <a class="button secondary" href="anweisung.pdf" download>PDF herunterladen</a>
      </div>
    </section>
  </main>
</body>
</html>
